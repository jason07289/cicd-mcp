# Headlamp: Ingress 컨트롤러가 있는 클러스터에서만 사용. host / ingressClassName 수정.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cicd-mcp
  labels:
    app.kubernetes.io/name: cicd-mcp
spec:
  ingressClassName: nginx
  rules:
    - host: cicd-mcp.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cicd-mcp
                port:
                  number: 8765
