server:
  port: 8765

spring:
  application:
    name: cicd-mcp

io:
  github:
    jason07289:
      cicd:
        mcp:
          repositories:
            - id: test-repo
              name: test-repo
              root_url: svn://localhost:3690/test-repo
              group: default
              credentials:
                username: ${SVN_DEMO_USER:admin}
                password: ${SVN_DEMO_PASSWORD:Password123!}
          authz_file: ""
          defaults:
            log_limit_max: 500
            file_content_max_bytes: 2000000
            max_revisions_for_stats: 500
